<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Vaper BA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0b0b0b;color:white;}

/* +18 OVERLAY */
.age-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
flex-direction:column;
text-align:center;
padding:20px;
}

.age-box{
background:#111;
padding:40px;
border-radius:15px;
border:2px solid gold;
}

.age-box h2{
color:gold;
margin-bottom:20px;
}

.age-box button{
margin:10px;
padding:10px 25px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.btn-yes{background:gold;}
.btn-no{background:#444;color:white;}

/* HEADER */
header{
background:#111;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid gold;
position:sticky;
top:0;
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo img{
width:60px;
height:60px;
object-fit:cover;
border-radius:50%;
}

/* NUEVA FUENTE SOLO PARA EL NOMBRE */
.logo h1{
font-family:'Playfair Display',serif;
color:gold;
font-size:24px;
letter-spacing:2px;
white-space:nowrap;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

nav a:hover{color:gold;}

.banner{
background:#000;
color:gold;
text-align:center;
padding:10px;
font-weight:600;
}

.section{padding:60px 8%;}
.section h2{color:gold;margin-bottom:30px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:15px;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px gold;
}

.card img{
width:100%;
height:260px;
object-fit:contain;
background:#111;
border-radius:12px;
padding:8px;
margin-bottom:15px;
}

.card h3{
font-size:16px;
min-height:45px;
}

.price{
color:gold;
font-weight:bold;
margin:10px 0;
}

button{
background:gold;
border:none;
padding:10px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
width:100%;
}

button:hover{background:#d4af37;}

.cart-icon{
position:fixed;
top:90px;
right:20px;
background:gold;
color:black;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
z-index:2000;
}

.cart-panel{
position:fixed;
top:0;
right:-380px;
width:350px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
z-index:1500;
}

.cart-panel.active{right:0;}
.cart-panel h3{color:gold;margin-bottom:20px;}

.login-box{
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:8px;
border:none;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
text-decoration:none;
}

footer{
background:#111;
text-align:center;
padding:25px;
border-top:2px solid gold;
margin-top:50px;
font-size:14px;
color:#ccc;
}
</style>
</head>
<body>

<!-- +18 -->
<div class="age-overlay" id="ageCheck">
<div class="age-box">
<h2>¿Sos mayor de 18 años?</h2>
<button class="btn-yes" onclick="enterSite()">Sí</button>
<button class="btn-no" onclick="leaveSite()">No</button>
</div>
</div>

<header>
<div class="logo">
<img src="https://raw.githubusercontent.com/elitevaper/elitevaper/98ebe8d84c7be3d78ab031350f2caedc8d4ed200/b46dcf7b-9b6a-4e0e-925c-fc4ea4c4a152.png">
<h1>ELITE VAPER BA</h1>
</div>

<nav>
<a href="#kits">Kits</a>
<a href="#sales">Sales</a>
<a href="#resistencias">Resistencias</a>
</nav>
</header>

<div class="banner">
🚚 Envíos a contraentrega | 🎁 En tu primera compra envío gratis
</div>

<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

<div class="cart-panel" id="cartPanel">
<h3>Tu Carrito</h3>

<div class="login-box">
<h4>Crear Cuenta</h4>
<input type="text" id="userName" placeholder="Nombre completo">
<input type="email" id="userEmail" placeholder="Email">
</div>

<div id="cart-items"></div>
<p>Total: $<span id="total">0</span></p>

<select id="shipping">
<option value="contraentrega">Contraentrega</option>
<option value="envio">Envío a domicilio</option>
</select>

<button onclick="finalizarCompra()">Finalizar Pedido</button>
</div>

<footer>
© 2026 Elite Vaper BA - Venta exclusiva para mayores de 18 años
</footer>

<a href="https://wa.me/541164696141" class="whatsapp" target="_blank">💬</a>

<script>
function enterSite(){
document.getElementById("ageCheck").style.display="none";
}

function leaveSite(){
window.location.href="https://www.google.com";
}
</script>

</body>
</html>
